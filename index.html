<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudGioDev - Tu Nube Privada Inteligente</title>
  
  <!-- Tailwind CSS CDN para estilos premium y adaptabilidad -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuración personalizada de fuentes y transiciones para Tailwind -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Ocultar barra de desplazamiento manteniendo funcionalidad */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Animaciones personalizadas */
    @keyframes bounce-in {
      0% { transform: translateY(100px); opacity: 0; }
      70% { transform: translateY(-10px); opacity: 1; }
      100% { transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scale-in {
      0% { transform: scale(0.95) translateY(10px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    
    .animate-bounce-in { animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    .animate-scale-in { animation: scale-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300">

  <div id="root"></div>

  <script type="module">
    // Importamos React, Firebase y Lucide Icons directamente desde CDNs de alto rendimiento
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query, updateDoc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { 
      Cloud, Upload, Search, Trash2, Folder, Clock, Share2, MoreVertical, Plus, 
      HardDrive, FileText, Image as ImageIcon, Video, Music, Menu, X, CheckCircle, 
      Loader2, Link, Copy, Lock, Globe, User, Mail, Camera, Save, Moon, Sun, 
      ChevronRight, FolderPlus, ArrowLeft, Play, Pause, Volume2, Maximize2, 
      SkipBack, SkipForward, ExternalLink, Sparkles, Key, Eye, EyeOff, 
      BrainCircuit, Wand2, MessageSquare, Send, Bot, Settings, Database
    } from 'https://esm.sh/lucide-react';

    
    // Configuración inicial de Firebase por defecto (puede ser reemplazada por el usuario en la interfaz)
    const DEFAULT_CONFIG = {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };

    const AVATAR_OPTIONS = [
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix",
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka",
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Jasper",
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Sasha",
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Buster",
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Milo"
    ];

    const App = () => {
      // Configuración de Firebase y Gemini AI
      const [firebaseConfig, setFirebaseConfig] = useState(() => {
        try {
          // Intentamos leer del backend o de variables globales inyectadas en compilación
          if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            return JSON.parse(__firebase_config);
          }
        } catch (e) {}
        // En su defecto, leemos del almacenamiento local o usamos la plantilla vacía
        const saved = localStorage.getItem('giocloud_firebase_config');
        return saved ? JSON.parse(saved) : DEFAULT_CONFIG;
      });

      const [geminiKey, setGeminiKey] = useState(() => {
        return localStorage.getItem('giocloud_gemini_key') || "";
      });

      // Instancias de Firebase dinámicas
      const [db, setDb] = useState(null);
      const [auth, setAuth] = useState(null);
      const [appId, setAppId] = useState(() => {
        return (typeof __app_id !== 'undefined' ? __app_id : null) || 'cloudgiodev-app';
      });

      // Controladores de estado principal
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState({ name: 'Usuario GioDev', email: '', photo: AVATAR_OPTIONS[0] });
      const [files, setFiles] = useState([]);
      const [folders, setFolders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [notification, setNotification] = useState(null);
      const [sharingFile, setSharingFile] = useState(null);
      const [hoveredImage, setHoveredImage] = useState(null);
      const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
      const [isSavingProfile, setIsSavingProfile] = useState(false);
      const [darkMode, setDarkMode] = useState(false);
      const [currentFolderId, setCurrentFolderId] = useState('root');
      const [isNewFolderModalOpen, setIsNewFolderModalOpen] = useState(false);
      const [newFolderName, setNewFolderName] = useState('');
      const [isUpgradeModalOpen, setIsUpgradeModalOpen] = useState(false);
      const [isSetupModalOpen, setIsSetupModalOpen] = useState(false);

      // Estados de IA (Análisis de archivo específico)
      const [geminiFile, setGeminiFile] = useState(null);
      const [geminiLoading, setGeminiLoading] = useState(false);
      const [geminiResult, setGeminiResult] = useState('');
      const [geminiAction, setGeminiAction] = useState(null);

      // Estados de Chat Flotante
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: 'ai', text: '¡Hola! Soy CloudAI. Puedo asistirte en la búsqueda y organización de tus documentos. ¿De qué deseas hablar?' }
      ]);
      const [userMessage, setUserMessage] = useState('');
      const [chatLoading, setChatLoading] = useState(false);

      // Estados de Ajustes de Seguridad
      const [tempPassword, setTempPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);

      // Estados Multimedia
      const [activeMedia, setActiveMedia] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);

      // Referencias de elementos DOM
      const fileInputRef = useRef(null);
      const textAreaRef = useRef(null);
      const videoRef = useRef(null);
      const chatEndRef = useRef(null);


      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatMessages]);

      // Inicialización dinámica de Firebase cuando cambia la configuración
      useEffect(() => {
        if (!firebaseConfig.apiKey) {
          // Si no hay configuración, abrimos el panel de configuración inicial
          setLoading(false);
          setIsSetupModalOpen(true);
          return;
        }

        try {
          let appInstance;
          const activeApps = getApps();
          if (activeApps.length === 0) {
            appInstance = initializeApp(firebaseConfig);
          } else {
            appInstance = activeApps[0];
          }

          const authInstance = getAuth(appInstance);
          const dbInstance = getFirestore(appInstance);

          setAuth(authInstance);
          setDb(dbInstance);

          const unsubscribeAuth = onAuthStateChanged(authInstance, async (currentUser) => {
            if (currentUser) {
              setUser(currentUser);
            } else {
              try {
                await signInAnonymously(authInstance);
              } catch (e) {
                console.error("Error iniciando sesión anónima", e);
              }
            }
          });

          return () => unsubscribeAuth();
        } catch (error) {
          console.error("Error inicializando Firebase:", error);
          showNotification("Error de Configuración de Base de Datos");
          setIsSetupModalOpen(true);
        }
      }, [firebaseConfig]);

      // Sincronización en tiempo real con Firestore
      useEffect(() => {
        if (!user || !db) return;

        setLoading(true);

        // Perfil y preferencias
        const settingsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config');
        const unsubscribeSettings = onSnapshot(settingsDocRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setProfile(data.profile || profile);
            setDarkMode(data.darkMode || false);
          } else {
            setDoc(settingsDocRef, { darkMode: false, profile: { name: 'Usuario GioDev', email: '', photo: AVATAR_OPTIONS[0] } });
          }
        });

        // Carpetas
        const foldersCol = collection(db, 'artifacts', appId, 'users', user.uid, 'folders');
        const unsubscribeFolders = onSnapshot(foldersCol, (snapshot) => {
          setFolders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        // Archivos
        const filesCol = collection(db, 'artifacts', appId, 'users', user.uid, 'files');
        const unsubscribeFiles = onSnapshot(filesCol, (snapshot) => {
          const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setFiles(docs.sort((a, b) => new Date(b.date) - new Date(a.date)));
          setLoading(false);
        });

        return () => {
          unsubscribeSettings();
          unsubscribeFolders();
          unsubscribeFiles();
        };
      }, [user, db]);


      const callGemini = async (prompt, systemInstruction = "Eres CloudAI, el copiloto inteligente de almacenamiento de CloudGioDev.") => {
        if (!geminiKey) {
          throw new Error("Clave de Gemini API no configurada.");
        }

        let retries = 0;
        const maxRetries = 3;
        
        const execute = async () => {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: systemInstruction }] }
            })
          });

          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text;
        };

        while (retries < maxRetries) {
          try {
            return await execute();
          } catch (err) {
            retries++;
            if (retries >= maxRetries) throw err;
            await new Promise(resolve => setTimeout(resolve, Math.pow(2, retries) * 1000));
          }
        }
      };

      const handleGeminiAction = async (action) => {
        if (!geminiFile) return;
        if (!geminiKey) {
          showNotification("Por favor configura tu Gemini API Key primero");
          return;
        }
        
        setGeminiLoading(true);
        setGeminiAction(action);
        setGeminiResult('');

        try {
          let prompt = "";
          if (action === 'summary') {
            prompt = `Genera un resumen ejecutivo breve y muy estructurado de un párrafo para el archivo: "${geminiFile.name}" (Tipo: ${geminiFile.type}).`;
          } else if (action === 'analyze') {
            prompt = `Analiza visualmente esta imagen de forma creativa pero corporativa y descriptiva: "${geminiFile.name}". Explica su contenido e intención de forma poética.`;
          } else if (action === 'rename') {
            prompt = `Sujere 3 nombres óptimos y limpios (sin caracteres raros) para el archivo "${geminiFile.name}" con la extensión correcta (${geminiFile.type}).`;
          }
          const result = await callGemini(prompt);
          setGeminiResult(result || "Error generando el contenido.");
        } catch (error) {
          setGeminiResult("Error al contactar con la IA. Comprueba tu clave de API en ajustes de perfil.");
        } finally {
          setGeminiLoading(false);
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!userMessage.trim() || chatLoading) return;
        if (!geminiKey) {
          showNotification("Configura tu Gemini API Key en ajustes de perfil");
          return;
        }

        const currentMsg = userMessage;
        setUserMessage('');
        setChatMessages(prev => [...prev, { role: 'user', text: currentMsg }]);
        setChatLoading(true);

        try {
          const fileList = files.map(f => `- ${f.name} (${f.type}, ${f.size})`).join('\n');
          const folderList = folders.map(fo => `- ${fo.name} (Carpeta)`).join('\n');
          
          const systemContext = `Eres CloudAI, el asistente de la nube CloudGioDev para el usuario "${profile.name}". 
          Actualmente tiene este espacio de archivos:
          ${fileList || "No tiene archivos aún."}
          Y carpetas:
          ${folderList || "No tiene carpetas creadas."}
          Responde amablemente, mantén un tono profesional y asiste directamente al usuario para localizar, renombrar o describir sus archivos.`;

          const aiResponse = await callGemini(currentMsg, systemContext);
          setChatMessages(prev => [...prev, { role: 'ai', text: aiResponse }]);
        } catch (error) {
          setChatMessages(prev => [...prev, { role: 'ai', text: 'Tengo problemas para procesar tu solicitud. Asegúrate de que la API Key en tu perfil es válida.' }]);
        } finally {
          setChatLoading(false);
        }
      };


      const openPlayer = (file) => {
        if (file.category === 'video' || file.category === 'audio') {
          const demoUrl = file.category === 'video' 
            ? "https://www.w3schools.com/html/mov_bbb.mp4" 
            : "https://www.w3schools.com/html/horse.mp3";
          setActiveMedia({ ...file, url: demoUrl });
          setIsPlaying(true);
        }
      };

      const closePlayer = () => { setActiveMedia(null); setIsPlaying(false); };

      const saveProfile = async (e) => {
        e.preventDefault();
        if (!user || !db) return;
        setIsSavingProfile(true);
        try {
          const settingsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config');
          await updateDoc(settingsDocRef, { profile: profile });
          showNotification('Perfil actualizado');
          setIsProfileModalOpen(false);
        } catch (error) { 
          console.error(error); 
        } finally { 
          setIsSavingProfile(false); 
        }
      };

      const createFolder = async (e) => {
        e.preventDefault();
        if (!newFolderName.trim() || !user || !db) return;
        const foldersCol = collection(db, 'artifacts', appId, 'users', user.uid, 'folders');
        await addDoc(foldersCol, { name: newFolderName, parentId: currentFolderId, date: new Date().toISOString() });
        setNewFolderName(''); setIsNewFolderModalOpen(false); showNotification('Carpeta creada');
      };

      const handleFileUpload = async (e) => {
        if (!user || !db) return;
        const uploadedFiles = e.target.files ? Array.from(e.target.files) : [];
        const filesCol = collection(db, 'artifacts', appId, 'users', user.uid, 'files');
        for (const file of uploadedFiles) {
          const typeStr = file.type.split('/')[1]?.toUpperCase() || 'Archivo';
          await addDoc(filesCol, { 
            name: file.name, 
            size: (file.size / (1024 * 1024)).toFixed(2) + ' MB', 
            type: typeStr, 
            category: getIconType(file.type), 
            date: new Date().toISOString(), 
            isPublic: false, 
            folderId: currentFolderId 
          });
        }
        showNotification(`${uploadedFiles.length} archivo(s) subidos`);
      };

      const getIconType = (type) => {
        if (type.includes('image')) return 'image';
        if (type.includes('video')) return 'video';
        if (type.includes('audio')) return 'audio';
        if (type.includes('pdf')) return 'pdf';
        return 'file';
      };

      const renderIcon = (type, size = 16) => {
        switch (type) {
          case 'image': return <ImageIcon size={size} className="text-blue-500" />;
          case 'video': return <Video size={size} className="text-purple-500" />;
          case 'audio': return <Music size={size} className="text-yellow-500" />;
          case 'pdf': return <FileText size={size} className="text-red-500" />;
          default: return <FileText size={size} className="text-gray-400" />;
        }
      };

      const togglePrivacy = async (id, currentStatus) => {
        if (!db || !user) return;
        const fileDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'files', id);
        await updateDoc(fileDoc, { isPublic: !currentStatus });
        showNotification(`Ahora es ${!currentStatus ? 'Público' : 'Privado'}`);
      };

      const deleteFile = async (id) => { 
        if (!db || !user) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'files', id)); 
        showNotification('Archivo eliminado'); 
      };

      const deleteFolder = async (id) => { 
        if (!db || !user) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'folders', id)); 
        showNotification('Carpeta eliminada'); 
      };

      const saveSetupConfig = (e) => {
        e.preventDefault();
        const data = new FormData(e.target);
        const newFirebase = {
          apiKey: data.get('apiKey'),
          authDomain: data.get('authDomain'),
          projectId: data.get('projectId'),
          storageBucket: data.get('storageBucket'),
          messagingSenderId: data.get('messagingSenderId'),
          appId: data.get('appId')
        };
        const newGemini = data.get('geminiKey');

        localStorage.setItem('giocloud_firebase_config', JSON.stringify(newFirebase));
        localStorage.setItem('giocloud_gemini_key', newGemini);

        setFirebaseConfig(newFirebase);
        setGeminiKey(newGemini);
        setIsSetupModalOpen(false);
        showNotification("Configuración de Producción Guardada!");
      };

      const currentFolders = folders.filter(f => f.parentId === currentFolderId);
      const currentFiles = files.filter(f => f.folderId === currentFolderId && f.name.toLowerCase().includes(searchTerm.toLowerCase()));
      const currentFolderName = folders.find(f => f.id === currentFolderId)?.name || 'Raíz';
      const storageUsed = (files.reduce((acc, f) => acc + parseFloat(f.size), 0) / 1024).toFixed(2);
      const storageTotal = 5;


      return (
        <div className={`flex h-screen font-sans transition-colors duration-300 ${darkMode ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-900'}`}>
          
          {/* Barra Lateral (Sidebar) */}
          <aside className={`fixed inset-y-0 left-0 z-50 w-64 border-r transition-all lg:relative lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className="flex items-center justify-between p-6">
              <div className="flex items-center gap-2 font-black text-xl text-indigo-500">
                <Cloud size={32} /> <span>CloudGioDev</span>
              </div>
              <button onClick={() => setSidebarOpen(false)} className="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg"><X size={20} /></button>
            </div>
            <nav className="mt-4 px-4 space-y-1">
              <NavItem icon={<HardDrive size={20} />} label="Mis Archivos" active darkMode={darkMode} />
              <NavItem icon={<Clock size={20} />} label="Recientes" darkMode={darkMode} />
              <NavItem icon={<Share2 size={20} />} label="Compartidos" darkMode={darkMode} />
              <NavItem icon={<Trash2 size={20} />} label="Papelera" darkMode={darkMode} />
            </nav>
            <div className="absolute bottom-0 w-full p-6 border-t dark:border-gray-700">
              <div className="mb-4">
                <div className="flex justify-between text-[10px] font-black uppercase mb-2 opacity-60"><span>Espacio</span><span>{storageUsed} GB / {storageTotal} GB</span></div>
                <div className={`w-full rounded-full h-1.5 overflow-hidden ${darkMode ? 'bg-gray-700' : 'bg-gray-100'}`}><div className="bg-indigo-500 h-full transition-all duration-1000" style={{ width: `${(storageUsed/storageTotal)*100}%` }}></div></div>
              </div>
              <button onClick={() => setIsUpgradeModalOpen(true)} className={`w-full py-2.5 text-xs font-black rounded-xl border transition-all flex items-center justify-center gap-2 ${darkMode ? 'border-indigo-500 text-indigo-400 hover:bg-indigo-500/10' : 'border-indigo-100 text-indigo-600 hover:bg-indigo-50'}`}><Sparkles size={14} /> MEJORAR PLAN</button>
            </div>
          </aside>

          {}
          <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            <header className={`h-20 border-b flex items-center justify-between px-6 lg:px-10 shrink-0 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
              <div className="flex items-center gap-4 flex-1">
                <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg"><Menu className="text-gray-400" /></button>
                <div className="relative w-full max-w-md">
                  <Search className={`absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 ${darkMode ? 'text-gray-500' : 'text-gray-300'}`} />
                  <input type="text" placeholder="Buscar archivos..." className={`w-full pl-11 pr-4 py-2.5 rounded-2xl outline-none text-sm transition-all border ${darkMode ? 'bg-gray-700 border-transparent focus:bg-gray-900 focus:border-indigo-500' : 'bg-gray-50 border-transparent focus:bg-white focus:border-indigo-300'}`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>
              </div>
              <div className="flex items-center gap-4 ml-4">
                {/* Botón de Ajustes Técnicos */}
                <button onClick={() => setIsSetupModalOpen(true)} className={`p-2.5 rounded-xl transition-all ${darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-500'}`} title="Configuración de Firebase/Gemini">
                  <Database size={20} />
                </button>
                <button onClick={toggleDarkMode} className={`p-2.5 rounded-xl transition-all ${darkMode ? 'bg-indigo-500/10 text-indigo-400' : 'bg-gray-100 text-gray-500'}`}>{darkMode ? <Sun size={20} /> : <Moon size={20} />}</button>
                <div onClick={() => setIsProfileModalOpen(true)} className="flex items-center gap-3 cursor-pointer p-1.5 pr-4 rounded-2xl hover:bg-indigo-50/50 transition-all">
                  <img src={profile.photo} className="w-10 h-10 rounded-xl object-cover shadow-sm border dark:border-gray-600" alt="P" />
                  <div className="hidden sm:block text-left"><p className="text-xs font-black leading-none">{profile.name}</p><p className="text-[9px] font-bold uppercase opacity-50">Gestionar</p></div>
                </div>
              </div>
            </header>

            {}
            <div className="flex-1 overflow-y-auto p-6 lg:p-10 no-scrollbar">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 text-left">
                <div className="flex items-center gap-2 text-sm font-bold">
                  <button onClick={() => setCurrentFolderId('root')} className={`px-3 py-1.5 rounded-lg transition-colors ${currentFolderId === 'root' ? 'bg-indigo-500 text-white' : 'opacity-50 hover:opacity-100'}`}>Mis Archivos</button>
                  {currentFolderId !== 'root' && (
                    <><ChevronRight size={16} className="opacity-30" /><span className="bg-indigo-500/10 text-indigo-500 px-3 py-1.5 rounded-lg">{currentFolderName}</span><button onClick={() => setCurrentFolderId('root')} className="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg ml-2"><ArrowLeft size={16}/></button></>
                  )}
                </div>
                <div className="flex gap-2 w-full sm:w-auto">
